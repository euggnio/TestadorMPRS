<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Configuração - Testador</title>
    <link rel="stylesheet" type="text/css" th:href="@{/style.css}">
    <script th:src="@{/javascript.js}"></script>
    <script th:src="@{/fragmentosjs/info.js}"></script>
    <link rel="icon" type="image/x-icon" href="/imagens/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
          rel="stylesheet">
</head>
<body>

<div th:replace="~{fragmentos/header :: header}"></div>
<img th:src="@{\info.png}" alt="info" class="infoBtn" onclick="showInfo('config')">

<div class="searcher">
    <div>
        <h1>
            Configuração
            <span style="color: orange; font-weight: bold"
                  th:if="${status != null}"
                  th:text="'| ' + ${status}">
        </span>
        </h1>
        <h5>Cadastro de novos hosts, atualmente temos 179 hosts no contrato</h5>
        <h5>Total de hosts cadastrados: <span th:text=" ${hosts.size()}"></span></h5>
    </div>
    <div>
        <h3>Host de teste</h3>
        <table class="host-info" style="width: 35%">
            <tr class="linha">
                <td><label>IP Testador</label></td>
                <td><input th:value="${ip}" readonly></td>
            </tr>
            <tr class="linha">
                <td><label>Usuário</label></td>
                <td><input th:value="${usuario}" readonly></td>
            </tr>
            <tr class="linha">
                <td><label>Senha</label></td>
                <td><input th:value="'Boa tentativa homoerectus'" type="password" readonly></td>
            </tr>
        </table>
    </div>
</div>

<h1><button onclick="salvarHostLiberar()" id="abrirCadastroBtn">
    Cadastrar novo host
</button></h1>

<form action="/atualizar" method="POST" id="salvaHost" class="cadastroDeDispositivos">

    <div style="min-width: 320px;flex: 1;">
        <h2 style="color: #ffffff; margin-bottom: 20px; border-bottom: 2px solid #11bb79; padding-bottom: 8px;">
            Dados do HOST
        </h2>
        <div style="display:flex; flex-direction:column; gap:14px;">
            <div>
                <label for="nome" class="form-label">Nome</label>
                <input form="salvaHost" type="text" id="nome" name="nome" placeholder="Nome..." class="inputConfig2">
            </div>
            <div>
                <label for="codigo" class="form-label">Código</label>
                <input form="salvaHost" type="text" id="codigo" name="codigo" placeholder="Sigla..." class="inputConfig2">
            </div>
            <div>
                <label for="ip" class="form-label">IP</label>
                <input form="salvaHost" type="text" id="ip" name="ip" placeholder="IP..." class="inputConfig2">
            </div>
            <div>
                <label for="velocidade" class="form-label">Velocidade</label>
                <input form="salvaHost" type="number" id="velocidade" name="velocidade" placeholder="Mbps..." class="inputConfig2">
            </div>
            <div>
                <label for="notacao" class="form-label">Notação</label>
                <input form="salvaHost" type="text" id="notacao" name="notacao" placeholder="/24" class="inputConfig2">
            </div>
        </div>
    </div>

    <div style="min-width: 320px;flex: 1;">
        <h2 style="color: #ffffff; margin-bottom: 20px; border-bottom: 2px solid #fd0000; padding-bottom: 8px;">
            APIs e Terceiros
        </h2>
        <div style="display:flex; flex-direction:column; gap:14px;">
            <div>
                <label for="smokeID" class="form-label">SmokeID</label>
                <input form="salvaHost" type="text" id="smokeID" name="smokeID" placeholder="ID do smoke..." class="inputConfig2">
            </div>
            <div>
                <label for="cacti" class="form-label">Cacti</label>
                <input form="salvaHost" type="text" id="cacti" name="cacti" placeholder="ID do gráfico..." class="inputConfig2">
            </div>
            <div>
                <label for="nagios" class="form-label">Nagios</label>
                <input form="salvaHost" type="text" id="nagios" name="nagios" placeholder="ID no Nagios..." class="inputConfig2">
            </div>
            <div>
                <label for="intra" class="form-label">Intra</label>
                <input form="salvaHost" type="text" id="intra" name="intra" placeholder="Código intranet..." class="inputConfig2">
            </div>
        </div>
    </div>

    <div>
        <h2 style="color: #ffffff; margin-bottom: 20px; border-bottom: 2px solid #11bb79; padding-bottom: 8px;">
            Verificações
        </h2>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <label class="config-form-row">
                <input type="checkbox" form="salvaHost" id="config.bloquearTesteBanda" name="config.bloquearTesteBanda">
                <span>Bloquear teste de banda</span>
            </label>
            <label class="config-form-row">
                <input type="checkbox" form="salvaHost"  id="config.limitarTesteBanda" name="config.limitarTesteBanda">
                <span>Limitar teste de banda</span>
            </label>
            <label class="config-form-row">
                <input type="checkbox" form="salvaHost" class="inputConfig2" id="config.duplaAbordagem" name="config.duplaAbordagem">
                <span>Dupla abordagem</span>
            </label>
            <label class="config-form-row">
                <input type="number" form="salvaHost" class="inputConfig2" id="config.interfaceWanID" name="config.interfaceWanID">
                <span>Interface Wan ID</span>
            </label>
            <label class="config-form-row">
                <input type="number" form="salvaHost" class="inputConfig2" id="config.interfaceLanID" name="config.interfaceLanID">
                <span>Interface Lan ID</span>
            </label>
        </div>
    </div>
    <div>
        <button form="salvaHost" type="submit">💾 Salvar Host</button>
        <button form="salvaHost" type="reset" onclick="salvarHostLiberar()" style="background-color: red">✖ Cancelar</button>
    </div>

</form>
<h2>Hosts cadastrados</h2>

<div class="searcher" style="background-color: #10182b; padding: 0;">
    <input type="text" id="search" placeholder="Pesquisa cidade 🔎" onkeyup="filterTable()">
</div>

<script th:inline="javascript">
    let editAtualHost = '';
    function liberarEdicaoHost(host){
        hostClass = host.dataset.id;
        form = document.getElementById(hostClass);
        cancelar = document.getElementById(hostClass + 'cancelar');
        if(editAtualHost.length <= 0){
            cancelar.style.display = '';
            host.innerHTML = 'Salvar';
            editAtualHost = hostClass;
            var inputs = document.getElementsByClassName(hostClass)
            console.log("" + editAtualHost)
            for (var i = 0; i < inputs.length; i++) {
                if (inputs[i].type === 'checkbox') {
                    inputs[i].classList.remove('check-travado');
                } else {
                    inputs[i].readOnly = false;
                }
                inputs[i].className += " inputConfig2";
            }
        }else if (editAtualHost == hostClass){
            form.submit();
        }
    }

    function salvarHostLiberar() {
        let tabela = document.getElementById("salvaHost");
        let botao = document.getElementById("abrirCadastroBtn");
        const visivel = window.getComputedStyle(tabela).display !== "none";
        tabela.style.display = visivel ? "none" : "flex";
        botao.style.display = visivel ? "" : "none";
    }

    function apagarHost(nome) {
        if (confirm('Tem certeza que quer deletar o host ' + nome + '?')) {
            fetch('/apagarCidade', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: 'nome=' + encodeURIComponent(nome)
            }).then(() => location.reload());
        }
    }
</script>

<table class="city" id="dataTable">
    <thead>
        <tr class="linha">
            <th>Host</th>
            <th>Sigla</th>
            <th>Velocidade</th>
            <th>Smoke</th>
            <th>Cacti</th>
            <th>Nagios</th>
            <th>Intra</th>
            <th>IP</th>
            <th>/</th>
            <th>LanID</th>
            <th>WanID</th>
            <th>Configs</th>
            <th>Ações</th>
        </tr>
    </thead>
    <tbody>
    <tr th:each="host : ${hosts}" class="linha">
        <form th:action="@{/atualizar}" th:method="POST" th:id="${host.nome}">
            <td>
                <a target="_blank" th:href="@{/unidade/{nome}(nome=${host.nome})}" th:text="${host.nome}">Nome</a>
                <input th:class="inputConfig" type="hidden" th:name="nome" th:value="${host.nome}" readonly>
            </td>
            <td>
                <input th:class="'inputConfig ' + ${host.nome}" th:name="codigo" th:value="${host.codigo}" readonly>
            </td>
            <td>
                <input th:class="'inputConfig ' + ${host.nome}" th:name="velocidade" th:value="${host.velocidade}" readonly>
            </td>
            <td>
                <input th:class="'inputConfig ' + ${host.nome}" th:name="smokeID" th:value="${host.smokeID}" readonly>
            </td>
            <td>
                <input th:class="'inputConfig ' + ${host.nome}" th:name="cacti" th:value="${host.cacti}" readonly>
            </td>
            <td>
                <input th:class="'inputConfig ' + ${host.nome}" th:name="nagiosID" th:value="${host.nagiosID}" readonly>
            </td>
            <td>
                <input th:class="'inputConfig ' + ${host.nome}" th:name="intra" th:value="${host.intra}" readonly>
            </td>
            <td>
                <input th:class="'inputConfig ' + ${host.nome}" th:name="ip" th:value="${host.ip}" readonly>
            </td>
            <td>
                <input th:class="'inputConfig ' + ${host.nome}" th:name="notacao" th:value="${host.notacao}" readonly>
            </td>
            <td>
                <input th:class="'inputConfig ' + ${host.nome}" th:name="config.interfaceLanID" th:value="${host.config.getInterfaceLanID()}" readonly>
            </td>

            <td>
                <input th:class="'inputConfig ' + ${host.nome}" th:name="config.interfaceWanID" th:value="${host.config.getInterfaceWanID()}" readonly>
            </td>
            <td class="configs-cell">
                <div class="config-row" th:classappend="${host.nome}">
                    <input type="checkbox" th:class="'config-check check-travado ' + ${host.nome}" th:name="config.bloquearTesteBanda" th:checked="${host.getConfig().bloquearTesteBanda}">
                    <span class="config-text">Bloquear</span>
                </div>
                <div class="config-row" th:classappend="${host.nome}">
                    <input type="checkbox" th:class="'config-check check-travado ' + ${host.nome}" th:name="config.limitarTesteBanda" th:checked="${host.config.limitarTesteBanda}">
                    <span class="config-text">Limitar</span>
                </div>
                <div class="config-row" th:classappend="${host.nome}">
                    <input type="checkbox" th:class="'config-check check-travado ' + ${host.nome}" th:name="config.duplaAbordagem" th:checked="${host.config.DuplaAbordagem}">
                    <span class="config-text">Dupla</span>
                </div>
            </td>
            <td class="actions-cell">
                <button type="button" class="btn-edit" th:attr="data-id=${host.nome}" onclick="liberarEdicaoHost(this)">🖊</button>
                <button type="button" th:id="${host.nome} + 'cancelar'" class="btn-cancel" style="display:none" onclick="location.reload()">Cancelar</button>
            </td>
        </form>
    </tr>
    </tbody>
</table>

<script>
    document.querySelectorAll('#dataTable tbody tr').forEach(row => {
        const deleteBtn = row.querySelector('td:last-of-type');
        deleteBtn.className = 'actions-cell';
        const nome = row.querySelector('a')?.textContent.trim();
        if (nome) {
            const btn = document.createElement('button');
            btn.textContent = 'Apagar';
            btn.className = 'btn-delete';
            btn.onclick = () => apagarHost(nome);
            deleteBtn.appendChild(btn);
            row.appendChild(deleteBtn);
        }
    });
</script>
</body>
</html>
