<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Testador</title>
    <link rel="stylesheet" type="text/css" href="/css/style.css">
    <link rel="stylesheet" type="text/css" th:href="@{/style.css}">
    <script src="/javascript.js"></script>
    <script th:src="@{/javascript.js}"></script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
<div id="loader">
    <div class="spinner"></div>
</div>
<div th:replace="~{header :: header}"></div>
<main>
    <div class="searcher">
        <input type="text" id="search" placeholder="Digite nome/ramal/sigla da cidade para filtrar..." onkeyup="filterTable()">
    </div>
    <table class="city" id="dataTable" style="border-collapse: separate; width:95% !important; border:none;">
        <thead>
            <tr class="linha">
                <th>Unidade</th>
                <th>Informações</th>
                <th>Quedas</th>
                <th>Smoke</th>
            </tr>
        </thead>
        <tbody>
        <tr th:each="cidade : ${cidades}" class="linha">
            <td><a target="_blank" th:href="@{/unidade/{nome}(nome=${cidade.nome})}" th:text="${cidade.nome}"></a></td>

            <td th:data-intra="${cidade.intra}" class="conteudo-container">
                <button  th:id="${cidade.intra}" th:attr="onclick='contatosIntra(this)'" style="display: none"> C
                </button>
                <div>Sigla: <span th:text="${cidade.codigo}"></span></div>
                <div>Intra: <a th:href="'https://intra.mp.rs.gov.br/site/promotorias/' + ${cidade.intra}"
                               th:text="${cidade.intra}"
                               target="_blank"
                    rel="noopener noreferrer"></a></div>
                <div id="ctc" style="font-size: 0.8em !important;"></div>
            </td>

            <td>
                <div class="calendarioUnidades" th:value="${cidade.nagiosID}"></div>
            </td>

            <td class="smokeUnidades" th:value="${cidade.smokeID}">
                <img th:src="'http://linux61.mp.rs.gov.br/smokeping/images/'+${!#strings.isEmpty(cidade.smokeID) ? cidade.smokeID.charAt(0) : ''}+'/'+ ${cidade.smokeID} +'_last_10800.png?'+${#dates.createNow().getTime()}"
                     alt="Gráfico Smoke" style="width: 28vw; max-height: 215px; object-fit: cover;">
                <button th:attr="onclick=|reloadSmoke('${cidade.smokeID}')|" >Atualizar</button>
            </td>

        </tr>
        </tbody>
    </table>
    <script type="text/javascript" th:inline="javascript">
        const quedas = /*[[${quedas}]]*/ null;
    </script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
    <script th:src="@{/graficosCalendario.js}"></script>
    <script>
        //  ***  Graficos de Calendario  ***
        const graficos = document.getElementsByClassName('calendarioUnidades')
        const anoAtual = new Date().getFullYear()

        Array.from(graficos).forEach(elem =>{
            fazGraficoQntQuedasCidade(elem, quedas, elem.getAttribute("value"), anoAtual)
        })

        function reloadSmoke(smokeid){
            console.log(smokeid)
            const todosGraficos = document.getElementsByClassName('smokeUnidades')
            const grafico = Array.from(todosGraficos).find(e => e.getAttribute("value") == smokeid)


            const img = grafico.children[0]
            const btn = grafico.children[1]

            btn.style.display = "none";
            img.style.filter = "none";
            img.style.backgroundColor = "#f3f3f3";
            img.src = "https://upload.wikimedia.org/wikipedia/commons/b/b1/Loading_icon.gif"

            fetch(`/pegarGraficoSmoke/` + smokeid)
            .then(response => {
                if (!response.ok) throw new Error("Erro na requisição: " + response.status)
                return response.text();
            })
            .then(url => {
                img.src = url;
            })
            .catch(error => console.error('Erro ao buscar gráfico:', error));

        }

    </script>

</main>
</body>
</html>
