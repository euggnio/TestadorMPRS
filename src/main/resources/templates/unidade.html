<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Testador</title>
    <link rel="stylesheet" type="text/css" th:href="@{/style.css}">
    <script th:src="@{/javascript.js}"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap"
          rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <style>
        .links{
            text-decoration: none;
            color: #00adb5;
        }
        #filtroCidade{
            margin-top: 20px;
            border: solid 2px gray;
        }
        h2{
            margin-top: 23px;
            margin-bottom: 3px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragmentos/header :: header}"></div>
<main>


    <div class="centro">
        <h2>🌐 DADOS <span th:text="${cidade.nome}"></span></h2>
        <div style="white-space: nowrap;">
            <input type="text" id="filtroCidade" oninput="atualizarFiltro(this)" placeholder="Digite o nome da cidade..." style="width: 100%; padding: 8px;">
            <ul id="listaCidades" class="listaCidades">
                <!-- Itens adicionados dinamicamente -->
            </ul>
        </div>
        <script th:inline="javascript">
            let nomeCidades = [];
            let busca = "";
            function atualizarFiltro(input) {
                const lista = document.getElementById("listaCidades");
                busca = input.value.toLowerCase();
                if (busca.length > 0) {
                    const filtradas = nomeCidades.filter(c => limpaAcentos(c.toLowerCase()).includes(busca));
                    atualizarLista(filtradas);
                    lista.style.display = "block"; // mostra a lista
                } else {
                    lista.style.display = "none"; // esconde a lista
                }
            }

            function pegarCidadesPorGet() {
                var url = [[@{/pegarListaCidades}]];
                    fetch(url)
                        .then(res => res.json())
                        .then(cidades => {
                            nomeCidades = cidades;
                            atualizarLista(nomeCidades);
                        })
                        .catch(err => console.error('Erro ao buscar cidades:', err));
            }

                function atualizarLista(cidades) {
                    const lista = document.getElementById("listaCidades");
                    lista.innerHTML = "";
                    cidades.forEach(cidade => {
                        const li = document.createElement("li");
                        li.textContent = cidade + " ↗";
                        li.style.padding = "8px";
                        li.style.cursor = "pointer";
                        li.style.color = "black";
                        li.addEventListener("click", () => {
                            window.location.href = "/unidade/" + cidade;
                        });
                        li.addEventListener("mouseover", () => li.style.backgroundColor = "#f0f0f0");
                        li.addEventListener("mouseout", () => li.style.backgroundColor = "");
                        lista.appendChild(li);
                    });
                }

                document.addEventListener("DOMContentLoaded", pegarCidadesPorGet);
        </script>
    </div>
            <table class="city-auto" id="dataTable">
                <thead>
                    <tr>
                        <th>DADOS CIDADE</th>
                        <th> CACTI - BANDA &nbsp;
                            <a class="links" target="_blank" th:href=" 'http://linux61.mp.rs.gov.br/cacti/graph.php?local_graph_id=' + ${cidade.cacti} + '&rra_id=0' ">[link]</a>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <table>
                                <tbody class="dadosUnidade">
                                    <tr>
                                        <td>Cidade</td>
                                        <td th:text="${cidade.nome}"></td>
                                    </tr>
                                    <tr>
                                        <td>Velocidade</td>
                                        <td th:text="${cidade.velocidade}"></td>
                                    </tr>
                                    <tr>
                                        <td>Ultimo teste de banda</td>
                                        <td th:text="${cidade.ultimoTesteBanda}"></td>
                                    </tr>
                                    <tr>
                                        <td> IP </td>
                                        <td th:text="${cidade.ip}"></td>
                                    </tr>
                                    <tr>
                                        <td>Sigla</td>
                                        <td th:text="${cidade.codigo}"></td>
                                    </tr>
                                    <tr>
                                        <td>Intra</td>
                                        <td><a target="_blank" th:href="'https://intra.mp.rs.gov.br/site/promotorias/' + ${cidade.intra}"><span th:text="${cidade.intra + '⤴'}"></span></a> </td>
                                    </tr>
                                    <tr>
                                        <td>Teste de Banda</td>
                                        <td><a target="_blank" th:href="@{/cidadesBanda?cidade={nome}(nome=${cidade.nome})}">TESTAR⤴</a></td>
                                    </tr>
                                    <tr>
                                        <td>Switches</td>
                                        <td id="listaSwitches">
                                            <label th:if="${cidade.intra == '96'}">N/A</label>
                                            <button th:if="${cidade.intra != '96'}" id="btnListaSW" onclick="abreListaSW()">Abrir Lista ˅</button>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </td>
                        <td th:utext="${cacti}" id="graficoCacti">
                        </td>
                    </tr>
                    <tr>
                        <th>Calendário de Quedas</th>
                        <th > SMOKE &nbsp;
                            <a class="links" target="_blank" th:href=" 'http://linux61.mp.rs.gov.br/smokeping/?target=' + ${cidade.smokeID.charAt(0)} + '.' + ${cidade.smokeID}">[link]</a>
                        </th>
                    </tr>
                    <tr>
                        <td>
                            <div id="chartQuedasPorCidade" style="width: 100%; height: 300px; margin:auto;margin-left: 1.3em;"></div>
                        </td>
                        <td id="graficoSmoke">
                            <img th:src="${smoke}" alt="Gráfico Smoke">
                        </td>
                    </tr>
                </tbody>
            </table>
    <main th:replace="~{fragmentos/dispositivos}"></main>


    <script type="text/javascript" th:inline="javascript">
        const quedas = /*[[${quedas}]]*/ null;
        const nomeCidade = /*[[${cidade.nagiosID}]]*/ null;
        const intraCidade = /*[[${cidade.intra}]]*/ null;
    </script>
    <script th:src="@{/graficosCalendario.js}"></script>
    <script>
        //  ***  Graficos de Calendario  ***
        let anoAtual = new Date().getFullYear()
        //fazGraficoTempoQuedasCidade(document.getElementById('chartTempoPorCidade'), quedas, nomeCidade, anoAtual)


        window.addEventListener('load', () => {
            getSwitchesDaUnidade(intraCidade)
            fazGraficoQntQuedasCidade(document.getElementById('chartQuedasPorCidade'), quedas, nomeCidade, anoAtual)
        });
    </script>

</main>
</body>
</html>
